services:
  # MongoDB Database
  mongodb:
    image: mongo:6.0
    container_name: salon_mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: kenikool-salon
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - salon_network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: salon_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - salon_network

  # RabbitMQ Message Broker
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: salon_rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - salon_network

  # Backend API Server
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: salon_backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      - REDIS_URL=redis://salon_redis:6379/0
      - RABBITMQ_URL=amqp://guest:guest@salon_rabbitmq:5672//
    volumes:
      - ./backend:/app
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - salon_network
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # Celery Worker
  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: salon_celery_worker
    env_file:
      - ./backend/.env
    environment:
      - REDIS_URL=redis://salon_redis:6379/0
      - RABBITMQ_URL=amqp://guest:guest@salon_rabbitmq:5672//
    volumes:
      - ./backend:/app
    depends_on:
      - redis
      - rabbitmq
      - backend
    networks:
      - salon_network
    command: celery -A app.tasks worker --loglevel=info

  # ngrok Tunnel (exposes backend to internet for Paystack webhooks)
  ngrok:
    image: ngrok/ngrok:latest
    container_name: salon_ngrok
    command: http backend:8000
    ports:
      - "4040:4040"
    env_file:
      - ./backend/.env
    depends_on:
      - backend
    networks:
      - salon_network

volumes:
  mongodb_data:
  redis_data:
  rabbitmq_data:

networks:
  salon_network:
    driver: bridge
