<!DOCTYPE html>
<html>
<head>
    <title>Debug Login Flow</title>
    <style>
        body {
            font-family: monospace;
            padding: 20px;
            background: #1e1e1e;
            color: #d4d4d4;
        }
        .section {
            margin: 20px 0;
            padding: 15px;
            background: #252526;
            border-left: 3px solid #007acc;
        }
        .success { border-left-color: #4ec9b0; }
        .error { border-left-color: #f48771; }
        .warning { border-left-color: #dcdcaa; }
        pre {
            background: #1e1e1e;
            padding: 10px;
            overflow-x: auto;
        }
        button {
            background: #007acc;
            color: white;
            border: none;
            padding: 10px 20px;
            cursor: pointer;
            font-size: 14px;
        }
        button:hover {
            background: #005a9e;
        }
        input {
            padding: 8px;
            margin: 5px 0;
            width: 300px;
            background: #3c3c3c;
            border: 1px solid #555;
            color: #d4d4d4;
        }
    </style>
</head>
<body>
    <h1>🔍 Login Flow Debugger</h1>
    
    <div class="section">
        <h2>Test Credentials</h2>
        <div>
            <label>Email:</label><br>
            <input type="email" id="email" value="owner@test.com">
        </div>
        <div>
            <label>Password:</label><br>
            <input type="password" id="password" value="password123">
        </div>
        <br>
        <button onclick="testLogin()">Test Login Flow</button>
        <button onclick="clearResults()">Clear Results</button>
    </div>
    
    <div id="results"></div>
    
    <script>
        const API_BASE = 'http://localhost:8000';
        
        function log(title, data, type = 'info') {
            const results = document.getElementById('results');
            const section = document.createElement('div');
            section.className = `section ${type}`;
            
            const heading = document.createElement('h3');
            heading.textContent = title;
            section.appendChild(heading);
            
            const pre = document.createElement('pre');
            pre.textContent = typeof data === 'string' ? data : JSON.stringify(data, null, 2);
            section.appendChild(pre);
            
            results.appendChild(section);
        }
        
        function clearResults() {
            document.getElementById('results').innerHTML = '';
        }
        
        async function testLogin() {
            clearResults();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            log('🚀 Starting Login Flow Test', `Email: ${email}`, 'info');
            
            try {
                // Step 1: Login
                log('📤 Step 1: POST /auth/login', 'Sending login request...', 'info');
                
                const loginResponse = await fetch(`${API_BASE}/auth/login`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    credentials: 'include', // Important for cookies
                    body: JSON.stringify({
                        email: email,
                        password: password,
                        remember_me: false
                    })
                });
                
                const loginData = await loginResponse.json();
                
                log('📥 Login Response', {
                    status: loginResponse.status,
                    statusText: loginResponse.statusText,
                    body: loginData
                }, loginResponse.ok ? 'success' : 'error');
                
                if (!loginResponse.ok) {
                    log('❌ Login Failed', 'Cannot proceed with test', 'error');
                    return;
                }
                
                // Step 2: Get current user
                log('📤 Step 2: GET /auth/me', 'Fetching user data...', 'info');
                
                const meResponse = await fetch(`${API_BASE}/auth/me`, {
                    method: 'GET',
                    credentials: 'include', // Important for cookies
                });
                
                const meData = await meResponse.json();
                
                log('📥 /auth/me Response', {
                    status: meResponse.status,
                    statusText: meResponse.statusText,
                    body: meData
                }, meResponse.ok ? 'success' : 'error');
                
                // Step 3: Analyze the response structure
                if (meResponse.ok) {
                    log('🔍 Response Structure Analysis', {
                        'Has user key': 'user' in meData,
                        'Has permissions key': 'permissions' in meData,
                        'User structure': meData.user ? Object.keys(meData.user) : 'N/A',
                        'User data': meData.user
                    }, 'info');
                    
                    // Step 4: Check role information
                    if (meData.user) {
                        const user = meData.user;
                        const roleNames = user.roleNames || [];
                        
                        let expectedRoute = '/dashboard';
                        if (roleNames.includes('Owner')) {
                            expectedRoute = '/dashboard';
                        } else if (roleNames.includes('Manager')) {
                            expectedRoute = '/manager';
                        } else if (roleNames.includes('Staff')) {
                            expectedRoute = '/appointments';
                        } else if (roleNames.includes('Customer')) {
                            expectedRoute = '/my-account';
                        }
                        
                        log('🎯 Expected Behavior', {
                            'User Email': user.email,
                            'User ID': user.id,
                            'Role Names': roleNames,
                            'Primary Role': user.role,
                            'Expected Redirect': expectedRoute,
                            'Has Owner Role': roleNames.includes('Owner'),
                            'Tenant ID': user.tenantId
                        }, roleNames.includes('Owner') ? 'success' : 'warning');
                        
                        // Step 5: Check what Login.tsx would do
                        log('💡 What Login.tsx Does', {
                            'Line 60-61': 'const userData = userResponse.data.user || userResponse.data',
                            'Extracts': 'userData.roleNames',
                            'Sets in store': {
                                id: user.id,
                                email: user.email,
                                firstName: user.firstName,
                                lastName: user.lastName,
                                phone: user.phone,
                                role: roleNames[0] || 'user',
                                roleNames: roleNames,
                                tenantId: user.tenantId
                            },
                            'Redirects to': expectedRoute
                        }, 'info');
                    } else {
                        log('❌ Missing User Data', 'Response does not contain user object', 'error');
                    }
                } else {
                    log('❌ Failed to Get User Data', meData, 'error');
                }
                
                // Step 6: Check localStorage
                log('💾 LocalStorage Check', {
                    'tenantId': localStorage.getItem('tenantId'),
                    'auth-store': localStorage.getItem('auth-store')
                }, 'info');
                
            } catch (error) {
                log('❌ Error During Test', {
                    message: error.message,
                    stack: error.stack
                }, 'error');
            }
        }
    </script>
</body>
</html>
